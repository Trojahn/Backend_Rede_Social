openapi: 3.0.0
info:
  title: API de Rede Social
  version: 1.0.0
  description: Documentação do sistema de rede social.

servers:
  - url: http://localhost:3000
    description: Servidor Local

tags:
  - name: Usuários
  - name: Posts
  - name: Comentários
  - name: Likes

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Insira o token JWT gerado no login.

  schemas:
    Usuario:
      type: object
      properties:
        id: { type: integer }
        login: { type: string }
        nome: { type: string }
        img: { type: string, nullable: true }

    Post:
      type: object
      properties:
        id: { type: integer }
        usuario: { type: integer }
        texto: { type: string, nullable: true }
        img: { type: string, nullable: true }
        editado: { type: boolean }
        data: { type: string, format: date-time }

    PostDetalhado:
      allOf:
        - $ref: "#/components/schemas/Post"
        - type: object
          properties:
            comentarios:
              type: array
              items: { $ref: "#/components/schemas/ComentarioSemPost" }
            likes:
              type: array
              items: { $ref: "#/components/schemas/Like" }

    Comentario:
      type: object
      properties:
        id: { type: integer }
        usuario: { type: integer }
        post: { type: integer }
        texto: { type: string }
        editado: { type: boolean }
        data: { type: string, format: date-time }

    ComentarioSemPost:
      type: object
      properties:
        id: { type: integer }
        usuario: { type: integer }
        texto: { type: string }
        editado: { type: boolean }
        data: { type: string, format: date-time }

    Like:
      type: object
      properties:
        id: { type: integer }
        usuario: { type: integer }
        data: { type: string, format: date-time }

    Mensagem:
      type: object
      properties:
        msg: { type: string, description: "Mensagem de retorno (sucesso ou erro)" }

paths:
  # ==========================================
  #                 USUÁRIOS
  # ==========================================
  /usuarios/:
    get:
      summary: Lista todos os usuários
      tags: [Usuários]
      responses:
        "200":
          description: Lista de usuários
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Usuario" }

    post:
      summary: Cadastro de usuário
      tags: [Usuários]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, senha, nome]
              properties:
                login: { type: string }
                senha: { type: string }
                nome: { type: string }
                img: { type: string, nullable: true }
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Usuario" }
        "400":
          description: Campos inválidos ou usuário já existente
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "500":
          description: Erro geral no servidor
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }

  /usuarios/check:
    get:
      summary: Verifica se o usuário está logado
      tags: [Usuários]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Usuário logado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }

  /usuarios/login:
    post:
      summary: Login de usuário
      tags: [Usuários]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, senha]
              properties:
                login: { type: string }
                senha: { type: string }
      responses:
        "200":
          description: Login efetuado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg: { type: string }
                  token: { type: string }
                  usuario: { $ref: "#/components/schemas/Usuario" }
        "400":
          description: Campos inválidos ou usuário não existe
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "403":
          description: Senha incorreta
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "500":
          description: Erro geral no servidor
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }

  # ==========================================
  #                  POSTS
  # ==========================================
  /posts/:
    get:
      summary: Lista todos os posts com comentários e likes
      tags: [Posts]
      responses:
        "200":
          description: Lista completa de posts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PostDetalhado" }
        "400":
          description: Nenhum post cadastrado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "500":
          description: Erro geral
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }

    post:
      summary: Cria um post
      tags: [Posts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                texto: { type: string }
                img: { type: string }
      responses:
        "201":
          description: Post criado com sucesso
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
        "400":
          description: Falta de texto/imagem ou erro de inserção
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "500":
          description: Erro geral
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }

  /posts/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      summary: Busca um post específico pelo ID
      tags: [Posts]
      responses:
        "200":
          description: Post encontrado com seus comentários e likes
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostDetalhado" }
        "400":
          description: Post não encontrado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "500":
          description: Erro geral
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
    put:
      summary: Edita um post
      tags: [Posts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                texto: { type: string }
                img: { type: string }
      responses:
        "201":
          description: Post editado com sucesso
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
        "400":
          description: Post não existe ou erro de edição
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "403":
          description: Tentativa de editar post de outro usuário
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "500":
          description: Erro geral
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
    delete:
      summary: Remove um post
      tags: [Posts]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Post deletado com sucesso
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "400":
          description: Post não encontrado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "403":
          description: Tentativa de deletar post de outro usuário
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "500":
          description: Erro geral
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }

  # ==========================================
  #         LIKES (Sub-recurso de Posts)
  # ==========================================
  /posts/{id}/likes:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      summary: Lista os likes de um post
      tags: [Likes]
      responses:
        "200":
          description: Lista de likes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Like" }
        "400":
          description: Post não existe
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "500":
          description: Erro geral
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
    post:
      summary: Adiciona ou remove (Toggle) like de um post
      tags: [Likes]
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Like adicionado ou removido com sucesso
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "400":
          description: Post não existe
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "500":
          description: Erro geral ou erro na operação do DB
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }

  # ==========================================
  #      COMENTÁRIOS (Sub-recurso de Posts)
  # ==========================================
  /posts/{id}/comentarios:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      summary: Lista os comentários de um post
      tags: [Comentários]
      responses:
        "200":
          description: Lista de comentários
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ComentarioSemPost" }
        "400":
          description: Post não existe
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "500":
          description: Erro geral
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
    post:
      summary: Adiciona um comentário em um post
      tags: [Comentários]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [texto]
              properties:
                texto: { type: string }
      responses:
        "201":
          description: Comentário criado com sucesso
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ComentarioSemPost" }
        "400":
          description: Texto inválido ou Post não existe
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "500":
          description: Erro geral
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }

  # ==========================================
  #      EDIÇÃO/EXCLUSÃO DE COMENTÁRIOS
  # ==========================================
  /comentarios/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    put:
      summary: Edita um comentário específico
      tags: [Comentários]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [texto]
              properties:
                texto: { type: string }
      responses:
        "201":
          description: Comentário editado com sucesso
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comentario" }
        "400":
          description: Texto inválido, comentário inexistente ou erro de edição
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "403":
          description: Tentativa de editar comentário de outro usuário
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "500":
          description: Erro geral
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
    delete:
      summary: Remove um comentário específico
      tags: [Comentários]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Comentário removido com sucesso
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "400":
          description: Comentário não existe ou tentativa de deletar comentário de outro usuário
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }
        "500":
          description: Erro geral ou erro ao remover do banco
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mensagem" }